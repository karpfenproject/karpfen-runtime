server {
  host = "127.0.0.1"
  port = 8080
}

websocket {
  queueTimeoutMs = 1000
  enabled        = true
}

logging {
  level         = "INFO"
  consoleOutput = false
}

engine {
  defaultTickDelayMs = 50
}

engineTracing {
  tracingEnabled = false
  tracingLogDirectory = "logs"
  tracingConsoleOutput = false
}

