server {
  # Server bind address
  host = "127.0.0.1"

  # Server port
  port = 8080
}

websocket {
  # WebSocket message queue timeout in milliseconds
  queueTimeoutMs = 1000

  # Enable WebSocket server
  enabled = true
}

logging {
  # Log level: DEBUG, INFO, WARN, ERROR
  level = "INFO"

  # Console output enabled
  consoleOutput = true
}

engine {
  # Default tick delay in milliseconds for newly created environments.
  # Can be overridden per environment via the /setTickDelay HTTP endpoint.
  defaultTickDelayMs = 1000
}

engineTracing {
  # Enable structured engine trace logging
  tracingEnabled = false

  # Directory for engine trace log files (one file per environment)
  # Leave empty to disable file output
  tracingLogDirectory = "logs"

  # Also print engine traces to console
  tracingConsoleOutput = false
}

