server {
  host = "127.0.0.1"
  port = 8080
}

websocket {
  queueTimeoutMs = 1000
  enabled        = true
}

logging {
  level         = "INFO"
  consoleOutput = true
}

engine {
  defaultTickDelayMs = 0
}

engineTracing {
  tracingEnabled = true
  tracingLogDirectory = "logs"
  tracingConsoleOutput = true
}

