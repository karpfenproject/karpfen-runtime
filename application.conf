server {
  # Server bind address
  host = "127.0.0.1"

  # Server port
  port = 8080
}

websocket {
  # WebSocket message queue timeout in milliseconds
  queueTimeoutMs = 1000

  # Enable WebSocket server
  enabled = true
}

logging {
  # Log level: DEBUG, INFO, WARN, ERROR
  level = "INFO"

  # Console output enabled
  consoleOutput = true
}

